services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_message
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    user: "0:0"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_ADDR: :8080
      DB_DRIVER: postgres
      POSTGRES_DSN: postgres://agent:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/agent_message?sslmode=disable
      APP_HOSTNAME: ${APP_HOSTNAME:?set APP_HOSTNAME}
      CORS_ALLOWED_ORIGINS: https://${APP_HOSTNAME:?set APP_HOSTNAME}
      UPLOAD_DIR: /var/lib/agent-message/uploads
      WEB_PUSH_VAPID_PUBLIC_KEY: ${WEB_PUSH_VAPID_PUBLIC_KEY:-}
      WEB_PUSH_VAPID_PRIVATE_KEY: ${WEB_PUSH_VAPID_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-}
      WEB_PUSH_STATE_DIR: /var/lib/agent-message/web-push
      AGENT_AUTO_GENERATE_WEB_PUSH: "1"
    volumes:
      - uploads_data:/var/lib/agent-message/uploads
      - web_push_data:/var/lib/agent-message/web-push

  gateway:
    build:
      context: .
      dockerfile: deploy/gateway.Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    environment:
      AGENT_GATEWAY_HOST: 0.0.0.0
      AGENT_GATEWAY_PORT: 8788
      AGENT_API_ORIGIN: http://server:8080
      AGENT_WEB_DIST: /app/web/dist

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  uploads_data:
  web_push_data:
